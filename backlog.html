<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ───────────────────────────────────────── */
:root {
  --bg:        #111109;
  --surface:   #1a1a17;
  --surface2:  #242420;
  --surface3:  #2c2c28;
  --border:    #363630;
  --border2:   #424240;
  --text:      #f0f0ea;
  --muted:     #7a7a70;
  --muted2:    #9a9a90;
  --accent:    #c8f135;
  --row-hover: #1e1e1a;

  --tag-feature:  #3a8fff;
  --tag-bug:      #ff4d6d;
  --tag-setup:    #3ecf8e;
  --tag-design:   #7b61ff;
  --tag-research: #f5a623;
  --tag-idea:     #a0a0b8;
  --tag-content:  #ff9de2;

  --sidebar-w: 220px;
  --header-h:  56px;
}

[data-theme="light"] {
  --bg:        #f5f5ef;
  --surface:   #ffffff;
  --surface2:  #ececе6;
  --surface3:  #e4e4de;
  --border:    #d4d4cc;
  --border2:   #c0c0b8;
  --text:      #1a1a16;
  --muted:     #888880;
  --muted2:    #666660;
  --accent:    #5a9e00;
  --row-hover: #f0f0ea;
}

/* ── RESET ───────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-areas:
    "sidebar header"
    "sidebar main";
  overflow: hidden;
  height: 100vh;
  font-size: 1.17rem;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo-mark {
  font-family: 'Syne', sans-serif;
  font-size: 1.17rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  text-decoration: none;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.75); }
}

.sidebar-nav {
  padding: 12px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-nav-label {
  font-size: 0.96rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 0 10px 8px;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 0.96rem;
  color: var(--muted2);
  text-decoration: none;
  transition: all 0.15s;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  font-family: 'DM Mono', monospace;
}

.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: var(--surface2); color: var(--text); }

.nav-link-icon {
  font-size: 1.17rem;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

/* SIDEBAR FILTERS */
.sidebar-filters {
  padding: 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sidebar-filter-label {
  font-size: 0.96rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 0 10px 4px;
}

.sidebar-filter-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  color: var(--muted2);
  outline: none;
  width: 100%;
  cursor: pointer;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%237a7a70' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}

.sidebar-filter-select:focus { border-color: var(--accent); }
.sidebar-filter-select option { background: var(--surface2); color: var(--text); }

.sidebar-search-wrap {
  position: relative;
}

.sidebar-search-wrap input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px 6px 28px;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  color: var(--text);
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}

.sidebar-search-wrap input:focus { border-color: var(--accent); }
.sidebar-search-wrap input::placeholder { color: var(--muted); }

.sidebar-search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 0.96rem;
  pointer-events: none;
}

/* SIDEBAR STATS */
.sidebar-stats {
  padding: 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-stats-label {
  font-size: 0.96rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 0 10px 8px;
}

.sidebar-stat-row {
  display: flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 5px;
  transition: background 0.1s;
  cursor: pointer;
}

.sidebar-stat-row:hover { background: var(--surface2); }

.sidebar-stat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.sidebar-stat-name {
  font-size: 0.96rem;
  color: var(--muted2);
  flex: 1;
  margin-left: 8px;
}

.sidebar-stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.17rem;
  font-weight: 700;
  color: var(--text);
}

.sidebar-bottom {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* SETTINGS DROPDOWN in sidebar bottom */
.settings-wrap {
  position: relative;
}

.settings-dropdown {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  z-index: 200;
  width: 220px;
  box-shadow: 0 -8px 24px rgba(0,0,0,0.3);
  display: none;
}

.settings-dropdown.open { display: block; }

.settings-section-label {
  font-size: 0.96rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 4px 8px 6px;
}

.settings-board-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border-radius: 6px;
  transition: background 0.1s;
}

.settings-board-row:hover { background: var(--surface2); }

.settings-board-name {
  flex: 1;
  font-size: 0.96rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: all 0.15s;
}

.settings-board-name:focus {
  border-color: var(--accent);
  background: var(--surface2);
}

.settings-board-delete {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  font-size: 0.96rem;
  transition: all 0.15s;
  flex-shrink: 0;
}

.settings-board-delete:hover { color: #ff4d6d; background: rgba(255,77,109,0.1); }

.settings-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 6px 0;
}

.settings-new-board {
  display: flex;
  gap: 6px;
  padding: 4px 6px;
}

.settings-new-board input {
  flex: 1;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 5px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  color: var(--text);
  outline: none;
}

.settings-new-board input:focus { border-color: var(--accent); border-style: solid; }

.settings-new-board button {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 1.17rem;
  transition: all 0.15s;
}

.settings-new-board button:hover { background: rgba(200,241,53,0.08); }

/* ── HEADER ──────────────────────────────────────────────── */
header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 12px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.page-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.17rem;
  font-weight: 700;
  color: var(--text);
}

.page-subtitle {
  font-size: 0.96rem;
  color: var(--muted);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  padding: 6px 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: transparent;
  color: var(--muted2);
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.btn-accent {
  background: var(--accent);
  color: #111109;
  border-color: var(--accent);
  font-weight: 700;
}

.btn-accent:hover { background: #d4f84a; color: #111109; border-color: #d4f84a; }

.theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 1.17rem;
  line-height: 1;
  transition: all 0.15s;
}

.theme-toggle:hover { border-color: var(--border2); }

/* ── MAIN / TABLE ────────────────────────────────────────── */
main {
  grid-area: main;
  overflow: auto;
  display: flex;
  flex-direction: column;
}

.table-wrap {
  padding: 20px 28px 60px;
  flex: 1;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 680px;
}

thead tr {
  border-bottom: 1px solid var(--border2);
}

th {
  padding: 0 12px 10px;
  text-align: left;
  font-size: 0.96rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

th:hover { color: var(--muted2); }
th.sorted { color: var(--accent); }

th .sort-arrow { margin-left: 3px; opacity: 0.4; }
th.sorted .sort-arrow { opacity: 1; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:hover { background: var(--row-hover); }
tbody tr.filtered-out { display: none; }

td {
  padding: 11px 12px;
  vertical-align: middle;
}

/* ── TITLE CELL HIERARCHY ────────────────────────────────── */
.cell-edit {
  background: none;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 1.17rem;
  color: var(--text);
  -webkit-text-fill-color: var(--text);
  width: 100%;
  outline: none;
  padding: 2px 4px;
  border-radius: 4px;
  transition: background 0.1s;
}

.cell-edit:focus {
  background: var(--surface2);
  outline: 1px solid var(--accent);
}

.cell-edit::placeholder { color: var(--muted); -webkit-text-fill-color: var(--muted); }

/* ── STATUS BADGE ────────────────────────────────────────── */
.status-cell select {
  background: none;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  cursor: pointer;
  outline: none;
  padding: 3px 6px;
  border-radius: 4px;
  font-weight: 500;
  -webkit-appearance: none;
  appearance: none;
}

.status-ideas    { color: #5aa0ff; background: rgba(58,143,255,0.1); }
.status-backlog  { color: var(--muted2); background: var(--surface2); }
.status-progress { color: #f5a623; background: rgba(245,166,35,0.1); }
.status-blocked  { color: #ff6b85; background: rgba(255,77,109,0.1); }
.status-done     { color: #3ecf8e; background: rgba(62,207,142,0.1); }

/* ── TAGS ────────────────────────────────────────────────── */
.tags-cell {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  min-width: 130px;
}

.tag {
  font-size: 0.96rem;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: opacity 0.15s;
}

.tag:hover { opacity: 0.7; }
.tag-remove { margin-left: 3px; opacity: 0.5; }

.tag-Feature  { background: rgba(58,143,255,0.12);  color: #5aa0ff; }
.tag-Bug      { background: rgba(255,77,109,0.12);  color: #ff6b85; }
.tag-Setup    { background: rgba(62,207,142,0.12);  color: #3ecf8e; }
.tag-Design   { background: rgba(123,97,255,0.12);  color: #9480ff; }
.tag-Research { background: rgba(245,166,35,0.12);  color: #f5a623; }
.tag-Idea     { background: rgba(160,160,184,0.1);  color: #a0a0b8; }
.tag-Content  { background: rgba(255,157,226,0.12); color: #ff9de2; }

.tag-add-btn {
  font-size: 0.96rem;
  color: var(--muted);
  background: none;
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}

.tag-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── TAG PICKER ──────────────────────────────────────────── */
.tag-picker {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px;
  z-index: 300;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.tag-picker .tag { cursor: pointer; }
.tag-picker .tag:hover { opacity: 0.8; transform: scale(1.05); }

/* ── BOARD PILLS ─────────────────────────────────────────── */
.board-pill {
  font-size: 0.96rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted2);
}

.board-pill .pill-remove {
  opacity: 0.4;
  cursor: pointer;
  font-size: 0.96rem;
}

.board-pill .pill-remove:hover { opacity: 1; color: #ff4d6d; }

.boards-cell {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  min-width: 150px;
}

/* ── BOARD PICKER ────────────────────────────────────────── */
.board-picker {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px;
  z-index: 300;
  width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.board-picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.96rem;
  transition: background 0.1s;
}

.board-picker-item:hover { background: var(--surface2); }
.board-picker-item.selected { color: var(--accent); }

.board-picker-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 4px 0;
}

.board-picker-new {
  display: flex;
  gap: 6px;
  padding: 4px 2px;
}

.board-picker-new input {
  flex: 1;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 5px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  color: var(--text);
  outline: none;
}

.board-picker-new input:focus { border-color: var(--accent); border-style: solid; }

.board-picker-new button {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 1.17rem;
  transition: all 0.15s;
}

.board-picker-new button:hover { background: rgba(200,241,53,0.08); }

/* ── PRIORITY ────────────────────────────────────────────── */
.priority-cell select {
  background: none;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.96rem;
  cursor: pointer;
  outline: none;
  color: var(--text);
  -webkit-appearance: none;
  appearance: none;
}

/* ── ROW ACTIONS ─────────────────────────────────────────── */
.row-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

tbody tr:hover .row-actions { opacity: 1; }

.row-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 0.96rem;
  color: var(--muted);
  transition: all 0.15s;
}

.row-btn:hover { background: var(--surface2); color: var(--text); }
.row-btn.delete:hover { background: rgba(255,77,109,0.1); color: #ff4d6d; }

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-row td {
  text-align: center;
  color: var(--muted);
  padding: 48px;
  font-size: 0.96rem;
}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 100%;
  max-width: 500px;
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.17rem;
  font-weight: 800;
  margin-bottom: 14px;
}

.export-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  font-size: 0.96rem;
  line-height: 1.7;
  white-space: pre;
  overflow: auto;
  max-height: 300px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}

.modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 0.96rem;
  z-index: 500;
  transform: translateY(10px);
  opacity: 0;
  transition: all 0.2s;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* ── MOBILE ──────────────────────────────────────────────── */
@media (hover: none) {
  .row-actions { opacity: 1; }
}

@media (max-width: 900px) {
  body {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr;
    grid-template-areas:
      "header"
      "sidebar"
      "main";
    height: auto;
    overflow: visible;
  }

  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    max-height: none;
  }

  .sidebar-logo { padding: 10px 14px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-nav  { padding: 6px; border-bottom: none; border-right: 1px solid var(--border); display: flex; gap: 4px; flex-shrink: 0; }

  .sidebar-filters { flex-direction: row; padding: 6px 8px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; align-items: center; gap: 6px; }

<!-- SIDEBAR -->

<!-- HEADER -->

          <th onclick="sortBy('status')" style="width:130px">Status <span class="sort-arrow">↕</span></th>

    </div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
let items = [
  { id: 1,  title: 'Set up GitHub repo & enable GitHub Pages',         status: 'progress', tags: ['Setup'],           boards: ['Fake JIRA to-do list'],                   priority: 'High',   date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 2,  title: 'Replace Formspree endpoint with real form ID',     status: 'backlog',  tags: ['Setup'],           boards: ['Fake JIRA to-do list'],                   priority: 'Medium', date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 3,  title: 'Update GitHub Issues URL in config',               status: 'backlog',  tags: ['Setup'],           boards: ['Fake JIRA to-do list'],                   priority: 'Medium', date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 4,  title: 'Wire up Supabase for live data (pending CSO approval)', status: 'blocked', tags: ['Feature'],    boards: ['Fake JIRA to-do list'],                   priority: 'High',   date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 5,  title: 'Add multi-board support with cross-tagging',       status: 'backlog',  tags: ['Feature'],         boards: ['Fake JIRA to-do list'],                   priority: 'High',   date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 6,  title: 'Add SMS idea submission via Twilio',               status: 'ideas',    tags: ['Feature', 'Idea'], boards: [],                                         priority: 'Low',    date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 7,  title: 'Swap password gate for Supabase Auth',             status: 'backlog',  tags: ['Feature'],         boards: ['Fake JIRA to-do list'],                   priority: 'High',   date: '2025-04-24', notes: '', reporter: '', assignees: [] },
  { id: 8,  title: 'Link tokens.css to index.html and token-editor.html', status: 'backlog', tags: ['Setup','Design'], boards: ['Fake JIRA to-do list','Design System'], priority: 'Medium', date: '2025-04-24', notes: '', reporter: '', assignees: [] },
];

let nextId = 100;
let sortKey = 'title';
let sortDir = 1;

const ALL_TAGS     = ['Feature', 'Bug', 'Setup', 'Design', 'Research', 'Idea', 'Content'];
const STATUSES     = ['ideas', 'backlog', 'progress', 'blocked', 'done'];
const STATUS_LABELS = { ideas: 'Ideas', backlog: 'Backlog', progress: 'In Progress', blocked: 'Blocked', done: 'Done' };
const PRIORITIES   = ['High', 'Medium', 'Low'];
const TEAM = ['Brandon', 'Jaivin', 'Dave', 'Kate', 'Darien'];
let boards = ['Fake JIRA to-do list', 'Design System', 'DEAD 5.0 Wishlist', 'DEAD Admin Wishlist'];

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const tbody = document.getElementById('table-body');
  const sorted = [...items].sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (sortKey === 'priority') {
      const order = { High: 0, Medium: 1, Low: 2 };
      return (order[av] - order[bv]) * sortDir;
    }
    return String(av).localeCompare(String(bv)) * sortDir;
  });

  if (sorted.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">No items yet — hit + Add Item to start</td></tr>`;
  } else {
    tbody.innerHTML = sorted.map((item, i) => rowHTML(item, i + 1)).join('');
  }

  document.querySelectorAll('.tag-add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      showTagPicker(btn, parseInt(btn.dataset.id));
    });
  });

  document.querySelectorAll('.board-add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      showBoardPicker(btn, parseInt(btn.dataset.id));
    });
  });

  document.querySelectorAll('.assignee-add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      showAssigneePicker(btn, parseInt(btn.dataset.id));
    });
  });

  refreshBoardFilter();
  updateStats();
  updateCount();
  filterRows();
}

function rowHTML(item, idx) {
  const statusClass = `status-${item.status}`;
  const tagsHTML = item.tags.map(t =>
    `<span class="tag tag-${t}">${t}<span class="tag-remove" onclick="removeTag(${item.id},'${t}')">×</span></span>`
  ).join('');
  const itemBoards = item.boards || [];
  const boardsHTML = itemBoards.map(b =>
    `<span class="board-pill">${escHtml(b)}<span class="pill-remove" onclick="removeBoard(${item.id},'${escHtml(b)}')">×</span></span>`
  ).join('');

  const priColor = item.priority === 'High' ? '#ff6b85' : item.priority === 'Medium' ? '#f5a623' : 'var(--muted)';

  return `<tr data-id="${item.id}" data-status="${item.status}" data-tags="${item.tags.join(',')}" data-boards="${itemBoards.join(',')}" data-reporter="${item.reporter}">
    <td style="color:var(--muted);font-size: 0.96rem">${idx}</td>
    <td><input class="cell-edit" value="${escHtml(item.title)}" placeholder="Item title..."
      onchange="updateField(${item.id},'title',this.value)"
      onblur="updateField(${item.id},'title',this.value)"></td>
    <td class="status-cell">
      <select class="${statusClass}" onchange="updateField(${item.id},'status',this.value); this.className='status-'+this.value">
        ${STATUSES.map(s => `<option value="${s}" ${item.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
      </select>
    </td>
    <td>
      <div class="tags-cell">
        ${tagsHTML}
        <button class="tag-add-btn" data-id="${item.id}">+ tag</button>
      </div>
    </td>
    <td>
      <div class="boards-cell">
        ${boardsHTML}
        <button class="board-add-btn tag-add-btn" data-id="${item.id}">+ board</button>
      </div>
    </td>
    <td>
      <select class="reporter-select" onchange="updateField(${item.id},'reporter',this.value)">
        <option value="">—</option>
        ${TEAM.map(n => `<option ${item.reporter===n?'selected':''}>${n}</option>`).join('')}
      </select>
    </td>
    <td>
      <div class="assignees-cell" id="assignees-${item.id}">
        ${(item.assignees||[]).map(n => `<span class="assignee-pill">${escHtml(n)}<span class="pill-remove" onclick="removeAssignee(${item.id},'${escHtml(n)}')">×</span></span>`).join('')}
        <button class="tag-add-btn assignee-add-btn" data-id="${item.id}">+ assign</button>
      </div>
    </td>
    <td class="priority-cell">
      <select onchange="updateField(${item.id},'priority',this.value)" style="color:${priColor}">
        ${PRIORITIES.map(p => `<option ${item.priority===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </td>
    <td style="color:var(--muted);font-size: 0.96rem">${item.date}</td>
    <td>
      <div class="row-actions">
        <button class="row-btn delete" onclick="deleteRow(${item.id})" title="Delete">✕</button>
      </div>
    </td>
  </tr>`;
}

// ── TAG PICKER ────────────────────────────────────────────────────────────────
let activePicker = null;

function showTagPicker(btn, id) {
  closeTagPicker();
  const item = items.find(i => i.id === id);
  const available = ALL_TAGS.filter(t => !item.tags.includes(t));
  if (!available.length) return;

  const picker = document.createElement('div');
  picker.className = 'tag-picker';
  picker.id = 'active-picker';
  picker.innerHTML = available.map(t =>
    `<span class="tag tag-${t}" onclick="addTag(${id},'${t}')">${t}</span>`
  ).join('');

  const rect = btn.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.top  = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  document.body.appendChild(picker);
  activePicker = picker;

  setTimeout(() => document.addEventListener('click', closeTagPicker, { once: true }), 10);
}

function closeTagPicker() {
  if (activePicker) { activePicker.remove(); activePicker = null; }
}

function addTag(id, tag) {
  const item = items.find(i => i.id === id);
  if (item && !item.tags.includes(tag)) { item.tags.push(tag); render(); saveToStorage(); }
}

function removeTag(id, tag) {
  const item = items.find(i => i.id === id);
  if (item) { item.tags = item.tags.filter(t => t !== tag); render(); saveToStorage(); }
}

// ── BOARD PICKER ──────────────────────────────────────────────────────────────
let activeBoardPicker = null;

function showBoardPicker(btn, id) {
  closeTagPicker();
  if (activeBoardPicker) { activeBoardPicker.remove(); activeBoardPicker = null; }

  const item = items.find(i => i.id === id);
  const itemBoards = item.boards || [];

  const picker = document.createElement('div');
  picker.className = 'board-picker';
  picker.id = 'active-board-picker';

  const existingHTML = boards.map(b => `
    <div class="board-picker-item ${itemBoards.includes(b) ? 'selected' : ''}"
      onclick="toggleBoard(${id},'${escHtml(b)}')">
      <span>${escHtml(b)}</span>
      ${itemBoards.includes(b) ? '<span>✓</span>' : ''}
    </div>`).join('');

  picker.innerHTML = `
    ${existingHTML}
    ${boards.length ? '<hr class="board-picker-divider">' : ''}
    <div class="board-picker-new">
      <input type="text" placeholder="New board name..." id="new-board-input-${id}"
        onkeydown="if(event.key==='Enter')createBoard(${id})">
      <button onclick="createBoard(${id})">+</button>
    </div>`;

  const rect = btn.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.top  = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  document.body.appendChild(picker);
  activeBoardPicker = picker;

  setTimeout(() => {
    document.getElementById(`new-board-input-${id}`)?.focus();
    document.addEventListener('click', closeBoardPicker, { once: true });
  }, 10);
}

function closeBoardPicker() {
  if (activeBoardPicker) { activeBoardPicker.remove(); activeBoardPicker = null; }
}

let activeAssigneePicker = null;

function showAssigneePicker(btn, id) {
  closeTagPicker(); closeBoardPicker(); closeAssigneePicker();
  const item = items.find(i => i.id === id);
  const available = TEAM.filter(n => !(item.assignees||[]).includes(n));
  if (!available.length) return;
  const picker = document.createElement('div');
  picker.className = 'assignee-picker';
  picker.innerHTML = available.map(n =>
    `<div class="assignee-picker-item" onclick="addAssignee(${id},'${n}')">${n}</div>`
  ).join('');
  const rect = btn.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  document.body.appendChild(picker);
  activeAssigneePicker = picker;
  setTimeout(() => document.addEventListener('click', closeAssigneePicker, { once: true }), 10);
}

function closeAssigneePicker() {
  if (activeAssigneePicker) { activeAssigneePicker.remove(); activeAssigneePicker = null; }
}

function addAssignee(id, name) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (!item.assignees) item.assignees = [];
  if (!item.assignees.includes(name)) { item.assignees.push(name); render(); saveToStorage(); }
}

function removeAssignee(id, name) {
  const item = items.find(i => i.id === id);
  if (item) { item.assignees = (item.assignees||[]).filter(n => n !== name); render(); saveToStorage(); }
}

function toggleBoard(id, board) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (!item.boards) item.boards = [];
  if (item.boards.includes(board)) {
    item.boards = item.boards.filter(b => b !== board);
  } else {
    item.boards.push(board);
  }
  render(); saveToStorage();
}

function removeBoard(id, board) {
  const item = items.find(i => i.id === id);
  if (item) { item.boards = (item.boards || []).filter(b => b !== board); render(); saveToStorage(); }
}

function createBoard(id) {
  const input = document.getElementById(`new-board-input-${id}`);
  const name = input?.value.trim();
  if (!name) return;
  if (!boards.includes(name)) { boards.push(name); refreshBoardFilter(); }
  const item = items.find(i => i.id === id);
  if (item) {
    if (!item.boards) item.boards = [];
    if (!item.boards.includes(name)) item.boards.push(name);
  }
  closeBoardPicker(); render(); saveToStorage();
  showToast(`✓ Board "${name}" created`);
}

function refreshBoardFilter() {
  const sel = document.getElementById('filter-board');
  const current = sel.value;
  sel.innerHTML = `<option value="">All boards</option>` +
    boards.map(b => `<option ${b===current?'selected':''}>${escHtml(b)}</option>`).join('');
  renderSettingsBoardList();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function toggleSettings() {
  const dd = document.getElementById('settings-dropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    renderSettingsBoardList();
    setTimeout(() => document.addEventListener('click', closeSettingsOnOutside, { once: true }), 10);
  }
}

function closeSettingsOnOutside(e) {
  const wrap = document.querySelector('.settings-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('settings-dropdown').classList.remove('open');
  } else {
    setTimeout(() => document.addEventListener('click', closeSettingsOnOutside, { once: true }), 10);
  }
}

function renderSettingsBoardList() {
  const list = document.getElementById('settings-board-list');
  if (!list) return;
  if (boards.length === 0) {
    list.innerHTML = `<div style="font-size: 0.96rem;color:var(--muted);padding:6px 8px">No boards yet</div>`;
    return;
  }
  list.innerHTML = boards.map((b, i) => `
    <div class="settings-board-row">
      <input class="settings-board-name" value="${escHtml(b)}" data-idx="${i}"
        onblur="renameBoard(${i}, this.value)"
        onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){this.value=boards[${i}];this.blur();}">
      <button class="settings-board-delete" onclick="deleteBoard(${i})" title="Delete board">✕</button>
    </div>`).join('');
}

function renameBoard(idx, newName) {
  newName = newName.trim();
  if (!newName || newName === boards[idx]) { renderSettingsBoardList(); return; }
  if (boards.includes(newName)) { showToast('A board with that name already exists', 'error'); renderSettingsBoardList(); return; }
  const oldName = boards[idx];
  boards[idx] = newName;
  items.forEach(item => {
    if (item.boards) item.boards = item.boards.map(b => b === oldName ? newName : b);
  });
  refreshBoardFilter(); render(); saveToStorage();
  showToast(`✓ Renamed to "${newName}"`);
}

function deleteBoard(idx) {
  const name = boards[idx];
  boards.splice(idx, 1);
  items.forEach(item => {
    if (item.boards) item.boards = item.boards.filter(b => b !== name);
  });
  refreshBoardFilter(); render(); saveToStorage();
  showToast(`Removed board "${name}"`);
}

function settingsCreateBoard() {
  const input = document.getElementById('settings-new-board-input');
  const name = input.value.trim();
  if (!name) return;
  if (boards.includes(name)) { showToast('Board already exists', 'error'); return; }
  boards.push(name);
  input.value = '';
  refreshBoardFilter(); render(); saveToStorage();
  showToast(`✓ Board "${name}" created`);
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
function addRow() {
  items.unshift({ id: nextId++, title: '', status: 'backlog', tags: [], boards: [], priority: 'Medium', date: new Date().toISOString().split('T')[0], notes: '' });
  render(); saveToStorage();
  setTimeout(() => {
    const first = document.querySelector('#table-body tr:first-child .cell-edit');
    if (first) first.focus();
  }, 50);
}

function deleteRow(id) {
  items = items.filter(i => i.id !== id);
  render(); saveToStorage();
}

function updateField(id, field, value) {
  const item = items.find(i => i.id === id);
  if (item) item[field] = value;
  updateStats(); updateCount(); saveToStorage();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  render();
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function filterRows() {
  const q  = document.getElementById('search-input').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const tg = document.getElementById('filter-tag').value;
  const bd = document.getElementById('filter-board').value;
  const rp = document.getElementById('filter-reporter').value;

  document.querySelectorAll('#table-body tr[data-id]').forEach(row => {
    const title     = row.querySelector('.cell-edit')?.value.toLowerCase() ?? '';
    const status    = row.dataset.status;
    const tags      = row.dataset.tags;
    const rowBoards = row.dataset.boards;

    const matchQ  = !q  || title.includes(q);
    const matchSt = !st || status === st;
    const matchTg = !tg || tags.split(',').includes(tg);
    const matchBd = !bd || rowBoards.split(',').includes(bd);
    const matchRp = !rp || (row.dataset.reporter === rp);

    row.classList.toggle('filtered-out', !(matchQ && matchSt && matchTg && matchBd && matchRp));
  });
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const counts = STATUSES.reduce((a, s) => ({ ...a, [s]: items.filter(i => i.status === s).length }), {});
  const statsEl = document.getElementById('sidebar-stats');
  if (!statsEl) return;
  const rows = [
    { color: '#f5a623',        label: 'In Progress', n: counts.progress },
    { color: '#ff6b85',        label: 'Blocked',     n: counts.blocked  },
    { color: '#3ecf8e',        label: 'Done',        n: counts.done     },
    { color: 'var(--muted)',   label: 'Backlog',     n: counts.backlog  },
    { color: '#5aa0ff',        label: 'Ideas',       n: counts.ideas    },
  ];
  statsEl.innerHTML = `
    <div class="sidebar-stats-label">Summary — ${items.length} total</div>
    ${rows.map(r => `
      <div class="sidebar-stat-row">
        <span class="sidebar-stat-dot" style="background:${r.color}"></span>
        <span class="sidebar-stat-name">${r.label}</span>
        <span class="sidebar-stat-num">${r.n}</span>
      </div>
    `).join('')}
  `;
}

function updateCount() {
  document.getElementById('item-count').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('backlog_items',   JSON.stringify(items));
    localStorage.setItem('backlog_boards',  JSON.stringify(boards));
    localStorage.setItem('backlog_nextId',  nextId);
  } catch(e) { console.warn('Storage save failed', e); }
}

function loadFromStorage() {
  try {
    const savedItems  = localStorage.getItem('backlog_items');
    const savedBoards = localStorage.getItem('backlog_boards');
    const savedNextId = localStorage.getItem('backlog_nextId');
    if (savedItems)  items  = JSON.parse(savedItems);
    if (savedBoards) boards = JSON.parse(savedBoards);
    if (savedNextId) nextId = parseInt(savedNextId);
  } catch(e) { console.warn('Storage load failed', e); }
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function openExport() {
  document.getElementById('export-box').textContent = JSON.stringify({ items, boards }, null, 2);
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copy JSON'; btn.style.background = ''; btn.style.color = '';
  document.getElementById('export-modal').classList.add('open');
}

function copyExport() {
  const text = JSON.stringify({ items, boards }, null, 2);
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  let success = false;
  try { success = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);

  if (success) {
    showToast('✓ JSON copied!');
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; btn.style.background = '#3ecf8e'; btn.style.color = '#111109'; }
    setTimeout(() => {
      const btn = document.getElementById('copy-btn');
      if (btn) { btn.textContent = 'Copy JSON'; btn.style.background = ''; btn.style.color = ''; }
    }, 2000);
  } else {
    const w = window.open('', '_blank');
    w.document.write('<pre style="font-family:monospace;padding:20px">' + text.replace(/</g,'&lt;') + '</pre>');
    w.document.title = 'Backlog JSON — select all and copy';
    showToast('Opened in new tab — Cmd+A then Cmd+C');
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('export-modal').addEventListener('mousedown', e => {
  if (e.target === document.getElementById('export-modal')) closeModal('export-modal');
});

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('theme', isLight ? 'dark' : 'light');
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  if (type === 'error') t.style.borderColor = '#ff4d6d';
  else t.style.borderColor = 'var(--border2)';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromStorage();
refreshBoardFilter();
render();
</script>
</body>
</html>
