<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN TOKENS ───────────────────────────────────────── */
  :root {
    --bg:        #111109;
    --surface:   #1a1a17;
    --surface2:  #242420;
    --surface3:  #2c2c28;
    --border:    #363630;
    --border2:   #424240;
    --text:      #f0f0ea;
    --muted:     #7a7a70;
    --muted2:    #9a9a90;
    --accent:    #c8f135;

    --col-ideas:    #3a8fff;
    --col-backlog:  #a0a0b8;
    --col-progress: #f5a623;
    --col-blocked:  #ff4d6d;
    --col-done:     #3ecf8e;

    --sidebar-w: 220px;
    --header-h:  56px;
  }

  [data-theme="light"] {
    --bg:       #f5f5ef;
    --surface:  #ffffff;
    --surface2: #ececе6;
    --surface3: #e4e4de;
    --border:   #d4d4cc;
    --border2:  #c0c0b8;
    --text:     #1a1a16;
    --muted:    #888880;
    --muted2:   #666660;
    --accent:   #5a9e00;
  }

  /* ── RESET ───────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-areas:
      "sidebar header"
      "sidebar main";
    overflow: hidden;
    height: 100vh;
  }

  /* ── SIDEBAR ─────────────────────────────────────────────── */
  .sidebar {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-logo-mark {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    text-decoration: none;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.75); }
  }

  .sidebar-nav {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-nav-label {
    font-size: 1.0rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0 10px 8px;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 1.0rem;
    color: var(--muted2);
    text-decoration: none;
    transition: all 0.15s;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    font-family: 'DM Mono', monospace;
  }

  .nav-link:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .nav-link.active {
    background: var(--surface2);
    color: var(--text);
  }

  .nav-link-icon {
    font-size: 1.17rem;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }

  .sidebar-stats {
    padding: 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-stats-label {
    font-size: 1.0rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0 10px 10px;
  }

  .sidebar-stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .sidebar-stat-row:hover { background: var(--surface2); }

  .sidebar-stat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-stat-name {
    font-size: 1.0rem;
    color: var(--muted2);
    flex: 1;
    margin-left: 8px;
  }

  .sidebar-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 700;
    color: var(--text);
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 12px 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── HEADER ──────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .page-subtitle {
    font-size: 1.0rem;
    color: var(--muted);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── BUTTONS ─────────────────────────────────────────────── */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 1.0rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted2);
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border2);
  }

  .btn-primary {
    background: var(--accent);
    color: #111109;
    border-color: var(--accent);
    font-weight: 700;
  }

  .btn-primary:hover {
    background: #d4f84a;
    color: #111109;
    border-color: #d4f84a;
  }

  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 9px;
    cursor: pointer;
    font-size: 1.17rem;
    transition: all 0.15s;
    line-height: 1;
  }

  .theme-toggle:hover { border-color: var(--border2); }

  /* ── MAIN CONTENT ────────────────────────────────────────── */
  main {
    grid-area: main;
    overflow: auto;
    padding: 24px 28px 40px;
  }

  /* ── BOARD ───────────────────────────────────────────────── */
  .board {
    display: flex;
    gap: 14px;
    min-width: max-content;
    align-items: flex-start;
  }

  .column {
    width: 310px;
    flex-shrink: 0;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px 12px;
  }

  .col-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-count {
    font-size: 1.0rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
  }

  .col-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  /* ── CARDS ───────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 16px 14px;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--col-color, var(--border));
    border-radius: 0;
  }

  .card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .card-title {
    font-size: 1.17rem;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 10px;
    padding-left: 10px;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 10px;
  }

  .tag {
    font-size: 1.0rem;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .card-date {
    font-size: 1.0rem;
    color: var(--muted);
  }

  .card-delete {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.0rem;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 3px 6px;
    border-radius: 4px;
    line-height: 1;
  }

  .card:hover .card-delete { opacity: 1; }

  .card-delete:hover {
    background: rgba(255,77,109,0.15);
    color: var(--col-blocked);
  }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .col-empty {
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 1.0rem;
    line-height: 1.6;
    border: 1px solid var(--border);
    background: var(--surface);
    opacity: 0.6;
  }

  /* ── COLUMN COLORS ───────────────────────────────────────── */
  .col-ideas    .col-dot { background: var(--col-ideas); }
  .col-backlog  .col-dot { background: var(--col-backlog); }
  .col-progress .col-dot { background: var(--col-progress); }
  .col-blocked  .col-dot { background: var(--col-blocked); }
  .col-done     .col-dot { background: var(--col-done); }

  .col-ideas    .card { --col-color: var(--col-ideas); }
  .col-backlog  .card { --col-color: var(--col-backlog); }
  .col-progress .card { --col-color: var(--col-progress); }
  .col-blocked  .card { --col-color: var(--col-blocked); }
  .col-done     .card { --col-color: var(--col-done); }

  .tag-ideas    { background: rgba(58,143,255,0.12);  color: #5aa0ff; }
  .tag-backlog  { background: rgba(160,160,184,0.1);  color: var(--col-backlog); }
  .tag-progress { background: rgba(245,166,35,0.12);  color: #f5a623; }
  .tag-blocked  { background: rgba(255,77,109,0.12);  color: #ff6b85; }
  .tag-done     { background: rgba(62,207,142,0.12);  color: #3ecf8e; }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    transform: translateY(8px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 1.0rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 1.0rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 1.17rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* ── CARD DETAIL ─────────────────────────────────────────── */
  .card-detail-field { margin-bottom: 14px; }

  .card-detail-label {
    font-size: 1.0rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .card-detail-value {
    font-size: 1.17rem;
    line-height: 1.55;
    color: var(--text);
  }

  .status-select-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .status-pill {
    font-size: 1.0rem;
    padding: 4px 11px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .status-pill:not(.active) { opacity: 1; }
  .status-pill:hover { filter: brightness(1.1); }

  .tag-ideas.active    { background: #3a8fff; color: #fff; border-color: #3a8fff; }
  .tag-backlog.active  { background: #a0a0b8; color: #fff; border-color: #a0a0b8; }
  .tag-progress.active { background: #f5a623; color: #111109; border-color: #f5a623; }
  .tag-blocked.active  { background: #ff4d6d; color: #fff; border-color: #ff4d6d; }
  .tag-done.active     { background: #3ecf8e; color: #111109; border-color: #3ecf8e; }

  /* ── GITHUB LINK ─────────────────────────────────────────── */
  .github-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 1.0rem;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .github-link:hover {
    color: var(--text);
    border-color: var(--border2);
    background: var(--surface2);
  }

  /* ── TOAST ───────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 1.0rem;
    z-index: 300;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── MOBILE ──────────────────────────────────────────────── */
  @media (hover: none) {
    .card-delete { opacity: 1; }
  }

  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "header"
        "sidebar"
        "main";
      height: auto;
      overflow: visible;
    }

    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .sidebar-logo { padding: 12px 16px; border-bottom: none; border-right: 1px solid var(--border); }
    .sidebar-nav  { padding: 8px; border-bottom: none; border-right: 1px solid var(--border); display: flex; gap: 4px; }
    .sidebar-nav-label { display: none; }
    .nav-link { width: auto; white-space: nowrap; }
    .sidebar-stats { padding: 8px; border-bottom: none; display: flex; gap: 8px; }
    .sidebar-stats-label { display: none; }
    .sidebar-stat-row { padding: 4px 8px; white-space: nowrap; }
    .sidebar-bottom { display: none; }
    .sidebar-stat-name { font-size: 1.0rem; }

    header { padding: 0 16px; }

    main { padding: 16px 12px 40px; overflow: auto; }

    .board {
      flex-direction: column;
      min-width: unset;
      width: 100%;
    }

    .column { width: 100%; }

    .modal { padding: 20px 16px; border-radius: 10px; }
    .modal-title { font-size: 1.17rem; }
    .modal-actions { flex-direction: column-reverse; }
    .modal-actions .btn { width: 100%; justify-content: center; }

    .toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }

    .status-select-row { gap: 5px; }
    .status-pill { font-size: 1.0rem; padding: 3px 8px; }
  }

  @media (max-width: 480px) {
    .github-link span { display: none; }
    .github-link { padding: 6px 9px; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span class="sidebar-logo-mark">
      <span class="logo-dot"></span>Fake JIRA
    </span>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-nav-label">Views</div>
    <a class="nav-link active" href="index.html">
      <span class="nav-link-icon">⬡</span> Kanban
    </a>
    <a class="nav-link" href="backlog.html">
      <span class="nav-link-icon">☰</span> Backlog
    </a>
  </nav>

  <div class="sidebar-stats" id="sidebar-stats">
    <div class="sidebar-stats-label">Overview</div>
    <!-- rendered by JS -->
  </div>

  <div class="sidebar-bottom">
    <a href="token-editor.html" class="nav-link">
      <span class="nav-link-icon">◈</span> Token Editor
    </a>
  </div>
</aside>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="page-title">Roadmap</span>
    <span class="page-subtitle" id="header-subtitle"></span>
  </div>
  <div class="header-actions">
    <a href="https://github.com/YOUR-REPO/issues/new" target="_blank" class="github-link" id="github-issues-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      <span>Submit via GitHub</span>
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
    <button class="btn btn-primary" onclick="openSubmitModal()">+ Submit Idea</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="board" id="board"></div>
</main>

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal">
    <div class="modal-title">Submit an Idea</div>
    <div class="modal-subtitle">Ideas go into the queue for review — thanks for contributing!</div>

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="idea-title" placeholder="Short description..." maxlength="120">
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="idea-desc" rows="3" placeholder="Why is this useful? Any context?"></textarea>
    </div>
    <div class="form-group">
      <label>Your name (optional)</label>
      <input type="text" id="idea-name" placeholder="Anonymous is fine">
    </div>

    <div class="form-group" style="padding: 12px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border);">
      <div style="font-size: 1.0rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em;">Also send via email</div>
      <form id="formspree-form" action="https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID" method="POST" target="_blank" style="display:flex; gap: 8px; align-items: center;">
        <input type="hidden" name="idea-title" id="fs-title">
        <input type="hidden" name="idea-details" id="fs-desc">
        <input type="hidden" name="submitted-by" id="fs-name">
        <button type="submit" class="btn" style="font-size: 1.0rem; padding: 5px 11px;" onclick="syncFormspree()">Send email copy</button>
        <span style="font-size: 1.0rem; color: var(--muted);">Optional</span>
      </form>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal('submit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitIdea()">Add to Ideas</button>
    </div>
  </div>
</div>

<!-- CARD DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-title" id="detail-title"></div>
    <div style="margin-bottom:20px;" id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('detail-modal')">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const GITHUB_ISSUES_URL = 'https://github.com/YOUR-USERNAME/YOUR-REPO/issues/new?template=idea.md&labels=idea';
document.getElementById('github-issues-link').href = GITHUB_ISSUES_URL;

const COLUMNS = [
  { id: 'ideas',    label: 'Ideas',       cls: 'col-ideas',    tagCls: 'tag-ideas' },
  { id: 'backlog',  label: 'Backlog',     cls: 'col-backlog',  tagCls: 'tag-backlog' },
  { id: 'progress', label: 'In Progress', cls: 'col-progress', tagCls: 'tag-progress' },
  { id: 'blocked',  label: 'Blocked',     cls: 'col-blocked',  tagCls: 'tag-blocked' },
  { id: 'done',     label: 'Done',        cls: 'col-done',     tagCls: 'tag-done' },
];

// ─── INITIAL DATA ─────────────────────────────────────────────────────────────
let items = [
  { id: 1, title: 'Set up GitHub repo & enable GitHub Pages', status: 'progress', tag: 'Setup', desc: 'Create the repo, push index.html, enable Pages in settings.', date: '2025-04-24' },
  { id: 2, title: 'Replace Formspree endpoint with real form ID', status: 'backlog', tag: 'Setup', desc: 'Sign up at formspree.io, create a form, paste the ID into the HTML.', date: '2025-04-24' },
  { id: 3, title: 'Update GitHub Issues URL in config section', status: 'backlog', tag: 'Setup', desc: 'Find the GITHUB_ISSUES_URL const near the top of the script and update it.', date: '2025-04-24' },
  { id: 4, title: 'Add SMS submission via Twilio (future)', status: 'ideas', tag: 'Feature', desc: 'When ready, wire up a Twilio webhook that posts to the board.', date: '2025-04-24' },
];

let nextId = 100;

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLUMNS.forEach(col => {
    const cards = items.filter(i => i.status === col.id);
    const colEl = document.createElement('div');
    colEl.className = `column ${col.cls}`;
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot"></span>${col.label}
        </div>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}">
        ${cards.length === 0
          ? `<div class="col-empty">Nothing here yet</div>`
          : cards.map(c => cardHTML(c, col)).join('')
        }
      </div>
    `;
    board.appendChild(colEl);
  });

  renderSidebarStats();
  updateHeaderSubtitle();
}

function cardHTML(card, col) {
  const d = card.date ? new Date(card.date).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '';
  return `
    <div class="card" onclick="openDetail(${card.id})">
      <button class="card-delete" onclick="deleteCard(event, ${card.id})" title="Delete">✕</button>
      <div class="card-title">${escHtml(card.title)}</div>
      <div class="card-meta">
        ${card.tag ? `<span class="tag ${col.tagCls}">${escHtml(card.tag)}</span>` : '<span></span>'}
        <span class="card-date">${d}</span>
      </div>
    </div>`;
}

function renderSidebarStats() {
  const total    = items.length;
  const done     = items.filter(i => i.status === 'done').length;
  const progress = items.filter(i => i.status === 'progress').length;
  const blocked  = items.filter(i => i.status === 'blocked').length;
  const backlog  = items.filter(i => i.status === 'backlog').length;
  const ideas    = items.filter(i => i.status === 'ideas').length;
  const pct      = total > 0 ? Math.round(done / total * 100) : 0;

  const rows = [
    { color: 'var(--col-progress)', label: 'In Progress', n: progress },
    { color: 'var(--col-blocked)',  label: 'Blocked',     n: blocked  },
    { color: 'var(--col-done)',     label: 'Done',        n: done     },
    { color: 'var(--col-backlog)',  label: 'Backlog',     n: backlog  },
    { color: 'var(--col-ideas)',    label: 'Ideas',       n: ideas    },
  ];

  const statsEl = document.getElementById('sidebar-stats');
  statsEl.innerHTML = `
    <div class="sidebar-stats-label">Overview — ${pct}% done</div>
    ${rows.map(r => `
      <div class="sidebar-stat-row">
        <span class="sidebar-stat-dot" style="background:${r.color}"></span>
        <span class="sidebar-stat-name">${r.label}</span>
        <span class="sidebar-stat-num">${r.n}</span>
      </div>
    `).join('')}
  `;
}

function updateHeaderSubtitle() {
  const total = items.length;
  const done  = items.filter(i => i.status === 'done').length;
  document.getElementById('header-subtitle').textContent =
    `${total} item${total !== 1 ? 's' : ''} · ${done} done`;
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function openSubmitModal() {
  document.getElementById('idea-title').value = '';
  document.getElementById('idea-desc').value  = '';
  document.getElementById('idea-name').value  = '';
  openModal('submit-modal');
  setTimeout(() => document.getElementById('idea-title').focus(), 200);
}

function submitIdea() {
  const title = document.getElementById('idea-title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  const desc = document.getElementById('idea-desc').value.trim();
  items.push({
    id: nextId++,
    title,
    status: 'ideas',
    tag: 'Idea',
    desc,
    date: new Date().toISOString().split('T')[0],
  });
  render();
  closeModal('submit-modal');
  showToast('✓ Idea added to the board');
}

function syncFormspree() {
  document.getElementById('fs-title').value = document.getElementById('idea-title').value;
  document.getElementById('fs-desc').value  = document.getElementById('idea-desc').value;
  document.getElementById('fs-name').value  = document.getElementById('idea-name').value;
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  document.getElementById('detail-title').textContent = item.title;
  document.getElementById('detail-body').innerHTML = `
    <div class="card-detail-field">
      <div class="card-detail-label">Description</div>
      <div class="card-detail-value">${item.desc ? escHtml(item.desc) : '<span style="color:var(--muted)">No description</span>'}</div>
    </div>
    <div class="card-detail-field">
      <div class="card-detail-label">Move to</div>
      <div class="status-select-row">
        ${COLUMNS.map(c => `
          <button class="status-pill tag-${c.id} ${c.id === item.status ? 'active' : ''}"
            onclick="moveCard(${id}, '${c.id}')">${c.label}</button>
        `).join('')}
      </div>
    </div>
  `;
  openModal('detail-modal');
}

function moveCard(id, newStatus) {
  const item = items.find(i => i.id === id);
  if (item) { item.status = newStatus; render(); closeModal('detail-modal'); showToast('✓ Moved'); }
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function deleteCard(e, id) {
  e.stopPropagation();
  items = items.filter(i => i.id !== id);
  render();
  showToast('Removed');
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('submit-modal'); closeModal('detail-modal'); }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
