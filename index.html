<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN TOKENS ───────────────────────────────────────── */
  :root {
    --bg:        #111109;
    --surface:   #1a1a17;
    --surface2:  #242420;
    --surface3:  #2c2c28;
    --border:    #363630;
    --border2:   #424240;
    --text:      #f0f0ea;
    --muted:     #7a7a70;
    --muted2:    #9a9a90;
    --accent:    #c8f135;

    --col-ideas:    #3a8fff;
    --col-backlog:  #a0a0b8;
    --col-progress: #f5a623;
    --col-blocked:  #ff4d6d;
    --col-done:     #3ecf8e;
    --col-feature:  #c084fc;
    --col-backend:  #22d3ee;

    --sidebar-w: 220px;
    --header-h:  56px;
  }

  [data-theme="light"] {
    --bg:       #f5f5ef;
    --surface:  #ffffff;
    --surface2: #ececе6;
    --surface3: #e4e4de;
    --border:   #d4d4cc;
    --border2:  #c0c0b8;
    --text:     #1a1a16;
    --muted:    #888880;
    --muted2:   #666660;
    --accent:   #5a9e00;
  }

  /* ── RESET ───────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-areas:
      "sidebar header"
      "sidebar main";
    overflow: hidden;
    height: 100vh;
  }

  /* ── SIDEBAR ─────────────────────────────────────────────── */
  .sidebar {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-logo-mark {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    text-decoration: none;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.75); }
  }

  .sidebar-nav {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-nav-label {
    font-size: 0.96rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0 10px 8px;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 0.96rem;
    color: var(--muted2);
    text-decoration: none;
    transition: all 0.15s;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    font-family: 'DM Mono', monospace;
  }

  .nav-link:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .nav-link.active {
    background: var(--surface2);
    color: var(--text);
  }

  .nav-link-icon {
    font-size: 1.17rem;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }

  .sidebar-stats {
    padding: 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-stats-label {
    font-size: 0.96rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0 10px 10px;
  }

  .sidebar-stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .sidebar-stat-row:hover { background: var(--surface2); }

  .sidebar-stat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-stat-name {
    font-size: 0.96rem;
    color: var(--muted2);
    flex: 1;
    margin-left: 8px;
  }

  .sidebar-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 700;
    color: var(--text);
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 12px 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── HEADER ──────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .page-subtitle {
    font-size: 0.96rem;
    color: var(--muted);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── BUTTONS ─────────────────────────────────────────────── */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.96rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted2);
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border2);
  }

  .btn-primary {
    background: var(--accent);
    color: #111109;
    border-color: var(--accent);
    font-weight: 700;
  }

  .btn-primary:hover {
    background: #d4f84a;
    color: #111109;
    border-color: #d4f84a;
  }

  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 9px;
    cursor: pointer;
    font-size: 1.17rem;
    transition: all 0.15s;
    line-height: 1;
  }

  .theme-toggle:hover { border-color: var(--border2); }
  .sign-out-mobile { display: none; }

  /* ── MAIN CONTENT ────────────────────────────────────────── */
  main {
    grid-area: main;
    overflow: auto;
    padding: 24px 28px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  main::-webkit-scrollbar { height: 6px; width: 6px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── BOARD ───────────────────────────────────────────────── */
  .board {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .column {
    width: clamp(210px, calc((100vw - 348px) / 7), 285px);
    flex-shrink: 0;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px 12px;
  }

  .col-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-count {
    font-size: 0.96rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
  }

  .col-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  /* ── CARDS ───────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 16px 14px;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--col-color, var(--border));
    border-radius: 0;
  }

  .card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .card-title {
    font-size: 1.17rem;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 10px;
    padding-left: 10px;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 10px;
  }

  .tag {
    font-size: 0.96rem;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .card-date {
    font-size: 0.96rem;
    color: var(--muted);
  }

  .card-delete {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.96rem;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 3px 6px;
    border-radius: 4px;
    line-height: 1;
  }

  .card:hover .card-delete { opacity: 1; }

  .card-delete:hover {
    background: rgba(255,77,109,0.15);
    color: var(--col-blocked);
  }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .col-empty {
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 0.96rem;
    line-height: 1.6;
    border: 1px solid var(--border);
    background: var(--surface);
    opacity: 0.6;
  }

  /* ── COLUMN COLORS ───────────────────────────────────────── */
  .col-ideas    .col-dot { background: var(--col-ideas); }
  .col-backlog  .col-dot { background: var(--col-backlog); }
  .col-progress .col-dot { background: var(--col-progress); }
  .col-blocked  .col-dot { background: var(--col-blocked); }
  .col-done     .col-dot { background: var(--col-done); }
  .col-feature  .col-dot { background: var(--col-feature); }
  .col-backend  .col-dot { background: var(--col-backend); }

  .col-ideas    .card { --col-color: var(--col-ideas); }
  .col-backlog  .card { --col-color: var(--col-backlog); }
  .col-progress .card { --col-color: var(--col-progress); }
  .col-blocked  .card { --col-color: var(--col-blocked); }
  .col-done     .card { --col-color: var(--col-done); }
  .col-feature  .card { --col-color: var(--col-feature); }
  .col-backend  .card { --col-color: var(--col-backend); }

  .tag-ideas    { background: rgba(58,143,255,0.12);   color: #5aa0ff; }
  .tag-backlog  { background: rgba(160,160,184,0.1);   color: var(--col-backlog); }
  .tag-progress { background: rgba(245,166,35,0.12);   color: #f5a623; }
  .tag-blocked  { background: rgba(255,77,109,0.12);   color: #ff6b85; }
  .tag-done     { background: rgba(62,207,142,0.12);   color: #3ecf8e; }
  .tag-feature  { background: rgba(192,132,252,0.12);  color: #c084fc; }
  .tag-backend  { background: rgba(34,211,238,0.12);   color: #22d3ee; }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    transform: translateY(8px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.17rem;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 0.96rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 0.96rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 1.17rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* ── CARD DETAIL ─────────────────────────────────────────── */
  .card-detail-field { margin-bottom: 14px; }

  .card-detail-label {
    font-size: 0.96rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .card-detail-value {
    font-size: 1.17rem;
    line-height: 1.55;
    color: var(--text);
  }

  .status-select-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .status-pill {
    font-size: 0.96rem;
    padding: 4px 11px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .status-pill:not(.active) { opacity: 1; }
  .status-pill:hover { filter: brightness(1.1); }

  .tag-ideas.active    { background: #3a8fff; color: #fff;    border-color: #3a8fff; }
  .tag-backlog.active  { background: #a0a0b8; color: #fff;    border-color: #a0a0b8; }
  .tag-progress.active { background: #f5a623; color: #111109; border-color: #f5a623; }
  .tag-blocked.active  { background: #ff4d6d; color: #fff;    border-color: #ff4d6d; }
  .tag-done.active     { background: #3ecf8e; color: #111109; border-color: #3ecf8e; }
  .tag-feature.active  { background: #c084fc; color: #111109; border-color: #c084fc; }
  .tag-backend.active  { background: #22d3ee; color: #111109; border-color: #22d3ee; }

  /* ── GITHUB LINK ─────────────────────────────────────────── */
  .github-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.96rem;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .github-link:hover {
    color: var(--text);
    border-color: var(--border2);
    background: var(--surface2);
  }

  /* ── TOAST ───────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.96rem;
    z-index: 300;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── MOBILE ──────────────────────────────────────────────── */
  @media (hover: none) {
    .card-delete { opacity: 1; }
  }

  @media (max-width: 900px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "header"
        "sidebar"
        "main";
      height: auto;
      overflow: visible;
    }

    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .sidebar-logo { padding: 12px 16px; border-bottom: none; border-right: 1px solid var(--border); }
    .sidebar-nav  { padding: 8px; border-bottom: none; border-right: 1px solid var(--border); display: flex; gap: 4px; }
    .sidebar-nav-label { display: none; }
    .nav-link { width: auto; white-space: nowrap; }
    .sidebar-stats { padding: 8px; border-bottom: none; display: flex; gap: 8px; }
    .sidebar-stats-label { display: none; }
    .sidebar-stat-row { padding: 4px 8px; white-space: nowrap; }
    .sidebar-bottom { display: none; }
    .sidebar-stat-name { font-size: 0.96rem; }
    .sign-out-mobile { display: inline-flex !important; }

    header { padding: 0 16px; }

    main { padding: 16px 12px 40px; overflow-x: auto; }

    .board {
      flex-direction: row;
      width: max-content;
      padding-bottom: 12px;
    }

    .column { width: 260px; }

    .modal { padding: 20px 16px; border-radius: 10px; }
    .modal-title { font-size: 1.17rem; }
    .modal-actions { flex-direction: column-reverse; }
    .modal-actions .btn { width: 100%; justify-content: center; }

    .toast { bottom: 16px; right: 16px; left: 16px; text-align: center; }

    .status-select-row { gap: 5px; }
    .status-pill { font-size: 0.96rem; padding: 3px 8px; }
  }

  @media (max-width: 480px) {
    .github-link span { display: none; }
    .github-link { padding: 6px 9px; }

    .board { flex-direction: column; width: 100%; }
    .column { width: 100%; }
  }

  .detail-reporter-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 11px;
    font-family: 'DM Mono', monospace;
    font-size: 0.96rem;
    color: var(--text);
    outline: none;
    margin-top: 4px;
  }

  .detail-assignees-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
    align-items: center;
  }

  .assignee-pill {
    font-size: 0.96rem;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted2);
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .assignee-pill .pill-remove { opacity: 0.4; cursor: pointer; }
  .assignee-pill .pill-remove:hover { opacity: 1; color: #ff4d6d; }

  .assignee-picker {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px;
    z-index: 400;
    display: flex;
    flex-direction: column;
    gap: 3px;
    width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .assignee-picker-item {
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.96rem;
    transition: background 0.1s;
  }

  .assignee-picker-item:hover { background: var(--surface2); }

  .tag-add-btn {
    font-size: 0.96rem;
    color: var(--muted);
    background: none;
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .tag-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DETAIL PANEL ────────────────────────────────────────── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .detail-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .detail-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 420px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 160;
    display: flex;
    flex-direction: column;
    transition: right 0.25s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }

  .detail-panel.open { right: 0; }

  .detail-panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const GITHUB_ISSUES_URL = 'https://github.com/YOUR-USERNAME/YOUR-REPO/issues/new?template=idea.md&labels=idea';
document.getElementById('github-issues-link').href = GITHUB_ISSUES_URL;

const COLUMNS = [
  { id: 'ideas',    label: 'Ideas',               cls: 'col-ideas',    tagCls: 'tag-ideas' },
  { id: 'backlog',  label: 'Backlog',             cls: 'col-backlog',  tagCls: 'tag-backlog' },
  { id: 'progress', label: 'In Progress',         cls: 'col-progress', tagCls: 'tag-progress' },
  { id: 'blocked',  label: 'Blocked',             cls: 'col-blocked',  tagCls: 'tag-blocked' },
  { id: 'done',     label: 'Done',                cls: 'col-done',     tagCls: 'tag-done' },
  { id: 'feature',  label: 'Feature',             cls: 'col-feature',  tagCls: 'tag-feature' },
  { id: 'backend',  label: 'Backend Improvement', cls: 'col-backend',  tagCls: 'tag-backend' },
];
const TEAM      = ['Brandon', 'Jaivin', 'Dave', 'Kate', 'Darien'];
const PRIORITIES = ['High', 'Medium', 'Low'];

// ─── COLUMN PREFS ─────────────────────────────────────────────────────────────
let colOrder = JSON.parse(localStorage.getItem('kanban_col_order') || 'null') || COLUMNS.map(c => c.id);
let hiddenCols = new Set(JSON.parse(localStorage.getItem('kanban_col_hidden') || '[]'));
// Sync: add new columns to end, drop removed ones
COLUMNS.forEach(c => { if (!colOrder.includes(c.id)) colOrder.push(c.id); });
colOrder = colOrder.filter(id => COLUMNS.find(c => c.id === id));

function getActiveCols() {
  return colOrder.map(id => COLUMNS.find(c => c.id === id)).filter(c => c && !hiddenCols.has(c.id));
}

function saveColPrefs() {
  localStorage.setItem('kanban_col_order', JSON.stringify(colOrder));
  localStorage.setItem('kanban_col_hidden', JSON.stringify([...hiddenCols]));
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
let items = [];

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  getActiveCols().forEach(col => {
    const cards = items.filter(i => i.status === col.id);
    const colEl = document.createElement('div');
    colEl.className = `column ${col.cls}`;
    colEl.dataset.colId = col.id;
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot"></span>${col.label}
        </div>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}">
        ${cards.length === 0
          ? `<div class="col-empty">Nothing here yet</div>`
          : cards.map(c => cardHTML(c, col)).join('')
        }
      </div>
    `;
    board.appendChild(colEl);
  });

  initColDrag();
  renderSidebarStats();
  updateHeaderSubtitle();
}

function cardHTML(card, col) {
  const d = card.date ? new Date(card.date).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '';
  return `
    <div class="card" onclick="openDetail(${card.id})">
      <button class="card-delete" onclick="deleteCard(event, ${card.id})" title="Delete">✕</button>
      <div class="card-title">${escHtml(card.title)}</div>
      <div class="card-meta">
        ${card.tag ? `<span class="tag ${col.tagCls}">${escHtml(card.tag)}</span>` : '<span></span>'}
        <span class="card-date">${d}</span>
      </div>
    </div>`;
}

function renderSidebarStats() {
  const total    = items.length;
  const done     = items.filter(i => i.status === 'done').length;
  const progress = items.filter(i => i.status === 'progress').length;
  const blocked  = items.filter(i => i.status === 'blocked').length;
  const backlog  = items.filter(i => i.status === 'backlog').length;
  const ideas    = items.filter(i => i.status === 'ideas').length;
  const feature  = items.filter(i => i.status === 'feature').length;
  const backend  = items.filter(i => i.status === 'backend').length;
  const pct      = total > 0 ? Math.round(done / total * 100) : 0;

  const rows = [
    { color: 'var(--col-progress)', label: 'In Progress',        n: progress },
    { color: 'var(--col-blocked)',  label: 'Blocked',            n: blocked  },
    { color: 'var(--col-done)',     label: 'Done',               n: done     },
    { color: 'var(--col-backlog)',  label: 'Backlog',            n: backlog  },
    { color: 'var(--col-ideas)',    label: 'Ideas',              n: ideas    },
    { color: 'var(--col-feature)',  label: 'Feature',            n: feature  },
    { color: 'var(--col-backend)',  label: 'Backend Improvement',n: backend  },
  ];

  const statsEl = document.getElementById('sidebar-stats');
  statsEl.innerHTML = `
    <div class="sidebar-stats-label">Overview — ${pct}% done</div>
    ${rows.map(r => `
      <div class="sidebar-stat-row">
        <span class="sidebar-stat-dot" style="background:${r.color}"></span>
        <span class="sidebar-stat-name">${r.label}</span>
        <span class="sidebar-stat-num">${r.n}</span>
      </div>
    `).join('')}
  `;
}

function updateHeaderSubtitle() {
  const total = items.length;
  const done  = items.filter(i => i.status === 'done').length;
  document.getElementById('header-subtitle').textContent =
    `${total} item${total !== 1 ? 's' : ''} · ${done} done`;
}

// ─── COLUMN DRAG & DROP ───────────────────────────────────────────────────────
let _dragSrcId = null;

function initColDrag() {
  const board = document.getElementById('board');
  board.querySelectorAll('.column').forEach(colEl => {
    const colId = colEl.dataset.colId;

    // Only start drag when mousedown is on the column header
    colEl.addEventListener('mousedown', e => {
      colEl.draggable = !!e.target.closest('.col-header');
    });

    colEl.addEventListener('dragstart', e => {
      _dragSrcId = colId;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => colEl.classList.add('dragging'), 0);
    });

    colEl.addEventListener('dragend', () => {
      _dragSrcId = null;
      board.querySelectorAll('.column').forEach(c => c.classList.remove('dragging', 'drag-over'));
    });

    colEl.addEventListener('dragover', e => {
      if (!_dragSrcId || _dragSrcId === colId) return;
      e.preventDefault();
      board.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      colEl.classList.add('drag-over');
    });

    colEl.addEventListener('dragleave', e => {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
    });

    colEl.addEventListener('drop', e => {
      e.preventDefault();
      if (!_dragSrcId || _dragSrcId === colId) return;
      const si = colOrder.indexOf(_dragSrcId);
      const di = colOrder.indexOf(colId);
      if (si !== -1 && di !== -1) {
        colOrder.splice(si, 1);
        colOrder.splice(di, 0, _dragSrcId);
        saveColPrefs();
        render();
      }
    });
  });
}

// ─── COLUMN FILTER ────────────────────────────────────────────────────────────
const COL_DOT_COLORS = {
  ideas: 'var(--col-ideas)', backlog: 'var(--col-backlog)', progress: 'var(--col-progress)',
  blocked: 'var(--col-blocked)', done: 'var(--col-done)', feature: 'var(--col-feature)',
  backend: 'var(--col-backend)'
};

function toggleColFilter() {
  const dd = document.getElementById('col-filter-dropdown');
  if (dd.classList.contains('open')) {
    dd.classList.remove('open');
  } else {
    buildColFilter();
    dd.classList.add('open');
    setTimeout(() => document.addEventListener('click', _colFilterOutside, { once: true }), 10);
  }
}

function _colFilterOutside(e) {
  const dd  = document.getElementById('col-filter-dropdown');
  const btn = document.getElementById('col-filter-btn');
  if (dd.contains(e.target) || btn.contains(e.target)) {
    setTimeout(() => document.addEventListener('click', _colFilterOutside, { once: true }), 10);
  } else {
    dd.classList.remove('open');
  }
}

function buildColFilter() {
  const dd = document.getElementById('col-filter-dropdown');
  dd.innerHTML = `
    <div class="col-filter-head">
      <span>Columns</span>
      <button class="col-filter-reset" onclick="resetColPrefs();event.stopPropagation()">Reset</button>
    </div>
    ${colOrder.map(id => {
      const col = COLUMNS.find(c => c.id === id);
      if (!col) return '';
      const vis = !hiddenCols.has(col.id);
      return `<div class="col-filter-row" onclick="toggleColVis('${col.id}')">
        <span class="col-filter-row-dot" style="background:${COL_DOT_COLORS[col.id]}"></span>
        <span class="col-filter-row-label">${col.label}</span>
        <span class="col-filter-row-check ${vis ? 'on' : ''}">${vis ? '✓' : ''}</span>
      </div>`;
    }).join('')}
  `;
}

function toggleColVis(id) {
  if (hiddenCols.has(id)) {
    hiddenCols.delete(id);
  } else {
    if (getActiveCols().length <= 1) return;
    hiddenCols.add(id);
  }
  saveColPrefs();
  render();
  buildColFilter();
}

function resetColPrefs() {
  colOrder = COLUMNS.map(c => c.id);
  hiddenCols = new Set();
  saveColPrefs();
  render();
  buildColFilter();
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
function openSubmitModal() {
  document.getElementById('idea-title').value = '';
  document.getElementById('idea-desc').value  = '';
  document.getElementById('idea-name').value  = '';
  openModal('submit-modal');
  setTimeout(() => document.getElementById('idea-title').focus(), 200);
}

async function submitIdea() {
  const title = document.getElementById('idea-title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  const desc  = document.getElementById('idea-desc').value.trim();
  const today = new Date().toISOString().split('T')[0];
  const draft = { title, status: 'ideas', tags: ['Idea'], boards: [], priority: 'Medium', date: today, notes: desc, reporter: '', assignees: [], start_date: '', end_date: '' };
  const { id, error } = await DB.insertItem(draft);
  if (error) { showToast('Failed to add idea'); return; }
  items.push({ ...draft, id, tag: 'Idea', desc });
  render();
  closeModal('submit-modal');
  showToast('✓ Idea added to the board');
}

function syncFormspree() {
  document.getElementById('fs-title').value = document.getElementById('idea-title').value;
  document.getElementById('fs-desc').value  = document.getElementById('idea-desc').value;
  document.getElementById('fs-name').value  = document.getElementById('idea-name').value;
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
const TAGS = ['Feature', 'Bug', 'Setup', 'Design', 'Research', 'Idea', 'Content'];
let _detailOpenId = null;

function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  _detailOpenId = id;

  const titleEl = document.getElementById('detail-panel-title');
  titleEl.value = item.title;

  const d = item.date ? new Date(item.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';

  document.getElementById('detail-panel-body').innerHTML = `
    <div class="detail-field">
      <div class="detail-field-label">Status</div>
      <select class="detail-field-select" onchange="updateDetailField(${id},'status',this.value)">
        ${COLUMNS.map(c => `<option value="${c.id}" ${item.status===c.id?'selected':''}>${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Priority</div>
      <select class="detail-field-select" onchange="updateDetailField(${id},'priority',this.value)">
        ${PRIORITIES.map(p => `<option ${item.priority===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Reporter</div>
      <select class="detail-field-select" onchange="updateDetailField(${id},'reporter',this.value)">
        <option value="">—</option>
        ${TEAM.map(n => `<option ${item.reporter===n?'selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Assignees</div>
      <div class="detail-assignees-wrap" id="detail-assignees-${id}">
        ${renderAssigneePills(item, id)}
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Tag</div>
      <select class="detail-field-select" onchange="updateDetailField(${id},'tag',this.value)">
        <option value="">—</option>
        ${TAGS.map(t => `<option ${item.tag===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Start Date</div>
      <input type="date" class="detail-field-select" style="color-scheme:dark" value="${item.start_date||''}" onchange="updateDetailField(${id},'start_date',this.value)">
    </div>
    <div class="detail-field">
      <div class="detail-field-label">End Date</div>
      <input type="date" class="detail-field-select" style="color-scheme:dark" value="${item.end_date||''}" onchange="updateDetailField(${id},'end_date',this.value)">
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Added</div>
      <div class="detail-field-date">${d || '—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Description</div>
      <textarea class="detail-field-textarea" onchange="updateDetailField(${id},'desc',this.value)" placeholder="No description...">${escHtml(item.desc||'')}</textarea>
    </div>
  `;

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
}

function renderAssigneePills(item, id) {
  return (item.assignees||[]).map(n =>
    `<span class="assignee-pill">${escHtml(n)}<span class="pill-remove" onclick="removeAssigneeDetail(${id},'${n}')">×</span></span>`
  ).join('') + `<button class="tag-add-btn" onclick="showDetailAssigneePicker(this,${id})">+ assign</button>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  _detailOpenId = null;
}

function saveDetailTitle() {
  if (_detailOpenId === null) return;
  const item = items.find(i => i.id === _detailOpenId);
  if (!item) return;
  const val = document.getElementById('detail-panel-title').value.trim();
  if (val) { item.title = val; render(); DB.updateItem(_detailOpenId, { title: val }); }
}

function updateDetailField(id, field, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item[field] = val;
  render();
  // map kanban-local fields to DB column names
  if (field === 'tag')  { DB.updateItem(id, { tags: val ? [val] : [] }); }
  else if (field === 'desc') { DB.updateItem(id, { notes: val }); }
  else { DB.updateItem(id, { [field]: val }); }
}

function moveCard(id, newStatus) {
  const item = items.find(i => i.id === id);
  if (item) { item.status = newStatus; render(); closeDetail(); showToast('✓ Moved'); DB.updateItem(id, { status: newStatus }); }
}

let activeDetailAssigneePicker = null;

function showDetailAssigneePicker(btn, id) {
  if (activeDetailAssigneePicker) { activeDetailAssigneePicker.remove(); activeDetailAssigneePicker = null; }
  const item = items.find(i => i.id === id);
  const available = TEAM.filter(n => !(item.assignees||[]).includes(n));
  if (!available.length) return;
  const picker = document.createElement('div');
  picker.className = 'assignee-picker';
  picker.innerHTML = available.map(n =>
    `<div class="assignee-picker-item" onclick="addAssigneeDetail(${id},'${n}')">${n}</div>`
  ).join('');
  const rect = btn.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  document.body.appendChild(picker);
  activeDetailAssigneePicker = picker;
  setTimeout(() => document.addEventListener('click', () => {
    if (activeDetailAssigneePicker) { activeDetailAssigneePicker.remove(); activeDetailAssigneePicker = null; }
  }, { once: true }), 10);
}

function addAssigneeDetail(id, name) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (!item.assignees) item.assignees = [];
  if (!item.assignees.includes(name)) {
    item.assignees.push(name);
    render();
    const wrap = document.getElementById(`detail-assignees-${id}`);
    if (wrap) wrap.innerHTML = renderAssigneePills(item, id);
    DB.updateItem(id, { assignees: item.assignees });
  }
}

function removeAssigneeDetail(id, name) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.assignees = (item.assignees||[]).filter(n => n !== name);
  render();
  const wrap = document.getElementById(`detail-assignees-${id}`);
  if (wrap) wrap.innerHTML = renderAssigneePills(item, id);
  DB.updateItem(id, { assignees: item.assignees });
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function deleteCard(e, id) {
  e.stopPropagation();
  items = items.filter(i => i.id !== id);
  render();
  showToast('Removed');
  DB.deleteItem(id);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('submit-modal'); closeDetail(); }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async function init() {
  try {
    items = await DB.loadItems();
    // Map DB fields to kanban-local fields
    items = items.map(i => ({ ...i, tag: (i.tags||[])[0] || '', desc: i.notes || '' }));
  } catch (e) {
    console.error('Failed to load items', e);
  }
  render();
})();
</script>
</body>
</html>
